name: Android CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Provide Maps API key
        run: echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> local.properties

      # The real google-services.json is not committed. CI writes a structurally valid
      # dummy (fake project, correct package names) so the google-services plugin can run
      # without needing any Firebase secret.
      - name: Provide dummy google-services.json
        run: |
          mkdir -p app/src/debug app/src/release
          write_gsj() {
            printf '{"project_info":{"project_number":"000000000000","project_id":"baad-ci","storage_bucket":"baad-ci.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000","android_client_info":{"package_name":"%s"}},"oauth_client":[],"api_key":[{"current_key":"AIzaSyDUMMYciDUMMYciDUMMYciDUMMYciDUMMYci0"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}\n' "$1" > "$2"
          }
          write_gsj com.feragusper.buenosairesantesydespues.dev app/src/debug/google-services.json
          write_gsj com.feragusper.buenosairesantesydespues app/src/release/google-services.json

      - name: Build & test
        run: ./gradlew assembleDebug lintDebug testDebugUnitTest --stacktrace

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: '**/build/reports'
          if-no-files-found: ignore
