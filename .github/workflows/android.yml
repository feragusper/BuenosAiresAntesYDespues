name: Android CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Provide Maps API key
        run: echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> local.properties

      # google-services.json is not committed; CI writes it from a repository secret.
      - name: Provide google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          mkdir -p app/src/debug app/src/release
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/src/debug/google-services.json
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/src/release/google-services.json

      - name: Build & test
        run: ./gradlew assembleDebug lintDebug testDebugUnitTest --stacktrace

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: '**/build/reports'
